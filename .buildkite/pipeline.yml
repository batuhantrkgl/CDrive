secrets:
  - GH_TOKEN

steps:
  - label: ":information_source: Version Info"
    key: "version"
    plugins:
      - docker#v5.12.0:
          image: "alpine:3.20"
          workdir: "/build"
          environment:
            - BUILDKITE_TAG
            - BUILDKITE_COMMIT
            - BUILDKITE_BRANCH
            - BUILDKITE_PULL_REQUEST
            - BUILDKITE_REPO
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      apk add --no-cache git

      VERSION=$$(grep 'CDRIVE_VERSION' cdrive.h | head -1 | cut -d'"' -f2)
      SHORT_SHA=$$(git rev-parse --short HEAD 2>/dev/null || echo "$${BUILDKITE_COMMIT:0:7}")

      if [[ -n "$${BUILDKITE_TAG}" ]] && [[ "$${BUILDKITE_TAG}" =~ ^v ]]; then
        VERSION="$${BUILDKITE_TAG}"
        IS_TAG="true"
      else
        VERSION="v$${VERSION}-beta.$${SHORT_SHA}"
        IS_TAG="false"
      fi

      if echo "$${VERSION}" | grep -qE "beta|alpha|rc" 2>/dev/null; then
        IS_BETA="true"
      else
        IS_BETA="false"
      fi

      buildkite-agent meta-data set "release-version" "$${VERSION}"
      buildkite-agent meta-data set "is-tag" "$${IS_TAG}"
      buildkite-agent meta-data set "is-beta" "$${IS_BETA}"

      echo "Version: $${VERSION}  Is tag: $${IS_TAG}  Is beta: $${IS_BETA}"

  - wait

  - label: ":linux: Build linux-x86_64"
    key: build-linux-x86_64
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          workdir: "/build"
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      make clean
      make

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-linux-x86_64
      buildkite-agent artifact upload "artifacts/cdrive-linux-x86_64"

  - label: ":linux: Build linux-i386"
    key: build-linux-i386
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          workdir: "/build"
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      dpkg --add-architecture i386
      apt-get update -q
      apt-get install -y \
        gcc-multilib libc6-dev-i386 linux-libc-dev:i386 libjson-c-dev:i386
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:i386

      make clean
      export PKG_CONFIG_PATH="/usr/lib/i386-linux-gnu/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/i386-linux-gnu/pkgconfig"
      CFLAGS="-m32 $(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC="gcc -m32" CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-linux-i386
      buildkite-agent artifact upload "artifacts/cdrive-linux-i386"

  - label: ":linux: Build linux-arm64"
    key: build-linux-arm64
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          workdir: "/build"
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      dpkg --add-architecture arm64
      apt-get install -y gcc-aarch64-linux-gnu
      sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
      echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe" >> /etc/apt/sources.list
      echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe" >> /etc/apt/sources.list
      apt-get update -q || true
      apt-get install -y linux-libc-dev:arm64 libjson-c-dev:arm64
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:arm64

      make clean
      export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/aarch64-linux-gnu/pkgconfig"
      CFLAGS="$(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC=aarch64-linux-gnu-gcc CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-linux-arm64
      buildkite-agent artifact upload "artifacts/cdrive-linux-arm64"

  - label: ":linux: Build linux-armhf"
    key: build-linux-armhf
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          workdir: "/build"
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      dpkg --add-architecture armhf
      apt-get install -y gcc-arm-linux-gnueabihf
      sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
      echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main universe" >> /etc/apt/sources.list
      echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe" >> /etc/apt/sources.list
      apt-get update -q || true
      apt-get install -y linux-libc-dev:armhf libjson-c-dev:armhf
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:armhf

      make clean
      export PKG_CONFIG_PATH="/usr/lib/arm-linux-gnueabihf/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/arm-linux-gnueabihf/pkgconfig"
      CFLAGS="$(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC=arm-linux-gnueabihf-gcc CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-linux-armhf
      buildkite-agent artifact upload "artifacts/cdrive-linux-armhf"

  - label: ":windows: Build windows-x86_64"
    key: build-windows-x86_64
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        gcc-mingw-w64-x86-64 mingw-w64-tools

      make clean
      make windows-x86_64

      mkdir -p artifacts
      cp out/dist/cdrive-windows-x86_64.exe artifacts/cdrive-windows-x86_64.exe
      buildkite-agent artifact upload "artifacts/cdrive-windows-x86_64.exe"

  - label: ":windows: Build windows-i386"
    key: build-windows-i386
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        gcc-mingw-w64-i686 mingw-w64-tools

      make clean
      make windows-i386

      mkdir -p artifacts
      cp out/dist/cdrive-windows-i386.exe artifacts/cdrive-windows-i386.exe
      buildkite-agent artifact upload "artifacts/cdrive-windows-i386.exe"

  - label: ":mac: Build darwin-x86_64"
    key: build-darwin-x86_64
    soft_fail: true
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git cmake clang \
        libxml2-dev libssl-dev libz-dev

      if [[ ! -d "/osxcross" ]]; then
        git clone --depth=1 https://github.com/tpoechtrager/osxcross.git /osxcross
        echo "WARNING: OSXCross requires an Apple SDK (MacOSX14.sdk.tar.xz)."
        echo "Place it in /osxcross/tarballs/ and run /osxcross/build.sh"
        echo "Skipping macOS build."
        mkdir -p artifacts
        echo "not-built" > artifacts/cdrive-darwin-x86_64
        buildkite-agent artifact upload "artifacts/cdrive-darwin-x86_64"
        exit 0
      fi

      export PATH="/osxcross/target/bin:$PATH"
      export CC=o64-clang
      export PKG_CONFIG=/bin/false

      CFLAGS="-I/osxcross/target/SDK/MacOSX14.sdk/usr/include"
      LIBS="-lcurl -ljson-c -lm -lpthread"

      make clean
      make CC="$CC" CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-darwin-x86_64
      buildkite-agent artifact upload "artifacts/cdrive-darwin-x86_64"

  - label: ":mac: Build darwin-arm64"
    key: build-darwin-arm64
    soft_fail: true
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git cmake clang \
        libxml2-dev libssl-dev libz-dev

      if [[ ! -d "/osxcross" ]]; then
        git clone --depth=1 https://github.com/tpoechtrager/osxcross.git /osxcross
        echo "WARNING: OSXCross requires an Apple SDK (MacOSX14.sdk.tar.xz)."
        echo "Place it in /osxcross/tarballs/ and run /osxcross/build.sh"
        echo "Skipping macOS ARM64 build."
        mkdir -p artifacts
        echo "not-built" > artifacts/cdrive-darwin-arm64
        buildkite-agent artifact upload "artifacts/cdrive-darwin-arm64"
        exit 0
      fi

      export PATH="/osxcross/target/bin:$PATH"
      export CC=oa64-clang
      export PKG_CONFIG=/bin/false

      CFLAGS="-I/osxcross/target/SDK/MacOSX14.sdk/usr/include"
      LIBS="-lcurl -ljson-c -lm -lpthread"

      make clean
      make CC="$CC" CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-darwin-arm64
      buildkite-agent artifact upload "artifacts/cdrive-darwin-arm64"

  - wait: ~
    continue_on_failure: false

  - label: ":rocket: Release"
    key: "release"
    depends_on:
      - step: "version"
        allow_failure: false
    plugins:
      - docker#v5.12.0:
          image: "alpine:3.20"
          workdir: "/build"
          environment:
            - BUILDKITE_TAG
            - BUILDKITE_COMMIT
            - BUILDKITE_BRANCH
            - BUILDKITE_PULL_REQUEST
            - BUILDKITE_REPO
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      if [[ "$${BUILDKITE_PULL_REQUEST}" != "false" ]]; then
        echo "PR build -- skipping release"; exit 0
      fi
      if [[ "$${BUILDKITE_BRANCH}" != "master" ]] && [[ -z "$${BUILDKITE_TAG}" ]]; then
        echo "Non-master, non-tag -- skipping release"; exit 0
      fi

      apk add --no-cache git github-cli curl

      VERSION=$$(buildkite-agent meta-data get release-version)
      IS_TAG=$$(buildkite-agent meta-data get is-tag)
      IS_BETA=$$(buildkite-agent meta-data get is-beta)

      echo "--- Downloading all artifacts"
      for step in build-linux-x86_64 build-linux-i386 build-linux-arm64 build-linux-armhf \
                  build-windows-x86_64 build-windows-i386 \
                  build-darwin-x86_64 build-darwin-arm64; do
        buildkite-agent artifact download "artifacts/*" . --step "$${step}" 2>&1 || true
      done

      echo "--- Collecting release assets"
      mkdir -p release-assets
      find artifacts/ -type f -exec cp {} release-assets/ \; 2>/dev/null
      ls -lh release-assets/

      # Create checksums
      cd release-assets
      sha256sum * > checksums.txt
      cd ..

      git config user.email "ci@buildkite"
      git config user.name "Buildkite CI"
      git remote set-url origin "https://batuhantrkgl:$${GH_TOKEN}@github.com/batuhantrkgl/CDrive.git"

      if [[ "$${IS_TAG}" == "true" ]]; then
        echo "--- Creating GitHub Release $${VERSION}"
        gh release create "$${VERSION}" \
          --title "CDrive $${VERSION}" \
          --notes "$$(git log -20 --oneline)" \
          --prerelease="$${IS_BETA}" \
          --draft=false \
          release-assets/*
      else
        echo "--- Creating Nightly Release"
        SHORT_SHA=$$(git rev-parse --short HEAD)
        NIGHTLY_TAG="nightly-$${SHORT_SHA}"
        git tag -f "$${NIGHTLY_TAG}"
        git push origin "$${NIGHTLY_TAG}" 2>&1 || true

        gh release create "$${NIGHTLY_TAG}" \
          --title "CDrive $${NIGHTLY_TAG} ($${VERSION})" \
          --notes "Nightly build from $${BUILDKITE_BRANCH}@$${BUILDKITE_COMMIT}" \
          --prerelease=true \
          --draft=false \
          release-assets/* 2>&1 || \
        echo "Release creation skipped"
      fi
