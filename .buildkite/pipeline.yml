secrets:
  - GH_TOKEN

steps:
  - label: ":information_source: Version Info"
    key: "version"
    plugins:
      - docker#v5.12.0:
          image: "alpine:3.20"
          shell: ["/bin/sh", "-e", "-c"]
          workdir: "/build"
          environment:
            - BUILDKITE_TAG
            - BUILDKITE_COMMIT
            - BUILDKITE_BRANCH
            - BUILDKITE_PULL_REQUEST
            - BUILDKITE_REPO
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      apk add --no-cache git

      VERSION=$$(grep 'CDRIVE_VERSION' cdrive.h | head -1 | cut -d'"' -f2)
      SHORT_SHA=$$(git rev-parse --short HEAD 2>/dev/null || echo "$${BUILDKITE_COMMIT}" | cut -c1-7)

      if [ -n "$${BUILDKITE_TAG}" ]; then
        case "$${BUILDKITE_TAG}" in
          v*) VERSION="$${BUILDKITE_TAG}"; IS_TAG="true" ;;
          *)  VERSION="v$${VERSION}-beta.$${SHORT_SHA}"; IS_TAG="false" ;;
        esac
      else
        VERSION="v$${VERSION}-beta.$${SHORT_SHA}"
        IS_TAG="false"
      fi

      if echo "$${VERSION}" | grep -qE "beta|alpha|rc" 2>/dev/null; then
        IS_BETA="true"
      else
        IS_BETA="false"
      fi

      buildkite-agent meta-data set "release-version" "$${VERSION}"
      buildkite-agent meta-data set "is-tag" "$${IS_TAG}"
      buildkite-agent meta-data set "is-beta" "$${IS_BETA}"

      echo "Version: $${VERSION}  Is tag: $${IS_TAG}  Is beta: $${IS_BETA}"

  - wait

  - label: ":linux: Build linux-x86_64"
    key: build-linux-x86_64
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          shell: ["/bin/bash", "-e", "-c"]
          workdir: "/build"
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      make clean
      make

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-linux-x86_64
      buildkite-agent artifact upload "artifacts/cdrive-linux-x86_64"

  - label: ":linux: Build linux-i386"
    key: build-linux-i386
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          shell: ["/bin/bash", "-e", "-c"]
          workdir: "/build"
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      dpkg --add-architecture i386
      apt-get update -q
      apt-get install -y \
        gcc-multilib libc6-dev-i386 linux-libc-dev:i386 libjson-c-dev:i386
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:i386

      make clean
      export PKG_CONFIG_PATH="/usr/lib/i386-linux-gnu/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/i386-linux-gnu/pkgconfig"
      CFLAGS="-m32 $(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC="gcc -m32" CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-linux-i386
      buildkite-agent artifact upload "artifacts/cdrive-linux-i386"

  - label: ":linux: Build linux-arm64"
    key: build-linux-arm64
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          shell: ["/bin/bash", "-e", "-c"]
          workdir: "/build"
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      dpkg --add-architecture arm64
      apt-get install -y gcc-aarch64-linux-gnu
      sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
      echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe" >> /etc/apt/sources.list
      echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe" >> /etc/apt/sources.list
      apt-get update -q || true
      apt-get install -y linux-libc-dev:arm64 libjson-c-dev:arm64
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:arm64

      make clean
      export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/aarch64-linux-gnu/pkgconfig"
      CFLAGS="$(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC=aarch64-linux-gnu-gcc CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-linux-arm64
      buildkite-agent artifact upload "artifacts/cdrive-linux-arm64"

  - label: ":linux: Build linux-armhf"
    key: build-linux-armhf
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          shell: ["/bin/bash", "-e", "-c"]
          workdir: "/build"
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      dpkg --add-architecture armhf
      apt-get install -y gcc-arm-linux-gnueabihf
      sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
      echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main universe" >> /etc/apt/sources.list
      echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe" >> /etc/apt/sources.list
      apt-get update -q || true
      apt-get install -y linux-libc-dev:armhf libjson-c-dev:armhf
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:armhf

      make clean
      export PKG_CONFIG_PATH="/usr/lib/arm-linux-gnueabihf/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/arm-linux-gnueabihf/pkgconfig"
      CFLAGS="$(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC=arm-linux-gnueabihf-gcc CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p artifacts
      cp out/dist/cdrive artifacts/cdrive-linux-armhf
      buildkite-agent artifact upload "artifacts/cdrive-linux-armhf"

  - label: ":windows: Build windows-x86_64"
    key: build-windows-x86_64
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          shell: ["/bin/bash", "-e", "-c"]
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git cmake gcc-mingw-w64-x86-64 mingw-w64-tools

      mkdir -p /tmp/build-deps /usr/x86_64-w64-mingw32

      cd /tmp/build-deps
      curl -sL https://github.com/json-c/json-c/archive/refs/tags/json-c-0.18-20240915.tar.gz | tar xz
      cd json-c-json-c-0.18-20240915
      cmake -B build -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc -DCMAKE_FIND_ROOT_PATH=/usr/x86_64-w64-mingw32 -DCMAKE_INSTALL_PREFIX=/usr/x86_64-w64-mingw32 -DBUILD_SHARED_LIBS=OFF -DBUILD_TESTING=OFF
      cmake --build build -j$(nproc)
      cmake --install build

      cd /tmp/build-deps
      curl -sL https://curl.se/download/curl-8.12.1.tar.gz | tar xz
      cd curl-8.12.1
      ./configure --host=x86_64-w64-mingw32 --prefix=/usr/x86_64-w64-mingw32 --enable-static --disable-shared --without-ssl --without-libssh2 --without-nghttp2 --without-libpsl --disable-ldap --disable-ldaps --disable-rtsp --disable-dict --disable-telnet --disable-tftp --disable-pop3 --disable-imap --disable-smtp --disable-gopher --disable-mqtt --disable-manual
      make -j$(nproc)
      make install

      cd /build
      make clean
      make windows-x86_64

      mkdir -p artifacts
      cp out/dist/cdrive-windows-x86_64.exe artifacts/cdrive-windows-x86_64.exe
      buildkite-agent artifact upload "artifacts/cdrive-windows-x86_64.exe"

  - label: ":windows: Build windows-i386"
    key: build-windows-i386
    plugins:
      - docker#v5.12.0:
          image: "ubuntu:22.04"
          shell: ["/bin/bash", "-e", "-c"]
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y build-essential pkg-config curl git cmake gcc-mingw-w64-i686 mingw-w64-tools

      mkdir -p /tmp/build-deps /usr/i686-w64-mingw32

      cd /tmp/build-deps
      curl -sL https://github.com/json-c/json-c/archive/refs/tags/json-c-0.18-20240915.tar.gz | tar xz
      cd json-c-json-c-0.18-20240915
      cmake -B build -DCMAKE_SYSTEM_NAME=Windows -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc -DCMAKE_FIND_ROOT_PATH=/usr/i686-w64-mingw32 -DCMAKE_INSTALL_PREFIX=/usr/i686-w64-mingw32 -DBUILD_SHARED_LIBS=OFF -DBUILD_TESTING=OFF
      cmake --build build -j$(nproc)
      cmake --install build

      cd /tmp/build-deps
      curl -sL https://curl.se/download/curl-8.12.1.tar.gz | tar xz
      cd curl-8.12.1
      ./configure --host=i686-w64-mingw32 --prefix=/usr/i686-w64-mingw32 --enable-static --disable-shared --without-ssl --without-libssh2 --without-nghttp2 --without-libpsl --disable-ldap --disable-ldaps --disable-rtsp --disable-dict --disable-telnet --disable-tftp --disable-pop3 --disable-imap --disable-smtp --disable-gopher --disable-mqtt --disable-manual
      make -j$(nproc)
      make install

      cd /build
      make clean
      make windows-i386

      mkdir -p artifacts
      cp out/dist/cdrive-windows-i386.exe artifacts/cdrive-windows-i386.exe
      buildkite-agent artifact upload "artifacts/cdrive-windows-i386.exe"

  - label: ":mac: Build darwin-x86_64"
    key: build-darwin-x86_64
    soft_fail: true
    plugins:
      - docker#v5.12.0:
          image: "vvasconcellos/osxcross:12.3-564e2b9-8"
          shell: ["/bin/bash", "-e", "-c"]
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail

      export PKG_CONFIG=/bin/false

      # Build json-c for macOS x86_64
      mkdir -p /opt/osxcross/target
      cd /tmp
      curl -sL https://github.com/json-c/json-c/archive/refs/tags/json-c-0.18-20240915.tar.gz | tar xz
      cd json-c-json-c-0.18-20240915
      cmake -B build \
        -DCMAKE_C_COMPILER=/opt/osxcross/bin/o64-clang \
        -DCMAKE_SYSTEM_NAME=Darwin \
        -DCMAKE_FIND_ROOT_PATH=/opt/osxcross/target \
        -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
        -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
        -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
        -DCMAKE_INSTALL_PREFIX=/opt/osxcross/target \
        -DBUILD_SHARED_LIBS=OFF \
        -DBUILD_TESTING=OFF
      cmake --build build -j$(nproc)
      cmake --install build

      # Build libcurl for macOS x86_64
      cd /tmp
      curl -sL https://curl.se/download/curl-8.12.1.tar.gz | tar xz
      cd curl-8.12.1
      CC=/opt/osxcross/bin/o64-clang \
      CFLAGS="-isysroot /opt/osxcross/SDK/MacOSX12.3.sdk -mmacosx-version-min=10.15" \
      LDFLAGS="-isysroot /opt/osxcross/SDK/MacOSX12.3.sdk" \
      ./configure \
        --host=x86_64-apple-darwin \
        --build=x86_64-pc-linux-gnu \
        --with-sysroot=/opt/osxcross/SDK/MacOSX12.3.sdk \
        --prefix=/opt/osxcross/target \
        --enable-static --disable-shared \
        --without-ssl --without-libssh2 --without-nghttp2 --without-libpsl \
        --disable-ldap --disable-ldaps --disable-rtsp --disable-dict \
        --disable-telnet --disable-tftp --disable-pop3 --disable-imap \
        --disable-smtp --disable-gopher --disable-mqtt --disable-manual
      make -C lib -j$(nproc)
      make -C lib install

      # Build cdrive for macOS x86_64
      cd /build
      make clean
      make darwin-x86_64

      mkdir -p artifacts
      cp out/dist/cdrive-darwin-x86_64 artifacts/cdrive-darwin-x86_64
      buildkite-agent artifact upload "artifacts/cdrive-darwin-x86_64"

  - label: ":mac: Build darwin-arm64"
    key: build-darwin-arm64
    soft_fail: true
    plugins:
      - docker#v5.12.0:
          image: "vvasconcellos/osxcross:12.3-564e2b9-8"
          shell: ["/bin/bash", "-e", "-c"]
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      set -euo pipefail

      export PKG_CONFIG=/bin/false

      # Build json-c for macOS arm64
      mkdir -p /opt/osxcross/target
      cd /tmp
      curl -sL https://github.com/json-c/json-c/archive/refs/tags/json-c-0.18-20240915.tar.gz | tar xz
      cd json-c-json-c-0.18-20240915
      cmake -B build \
        -DCMAKE_C_COMPILER=/opt/osxcross/bin/oa64-clang \
        -DCMAKE_SYSTEM_NAME=Darwin \
        -DCMAKE_FIND_ROOT_PATH=/opt/osxcross/target \
        -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
        -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
        -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
        -DCMAKE_INSTALL_PREFIX=/opt/osxcross/target \
        -DBUILD_SHARED_LIBS=OFF \
        -DBUILD_TESTING=OFF
      cmake --build build -j$(nproc)
      cmake --install build

      # Build libcurl for macOS arm64
      cd /tmp
      curl -sL https://curl.se/download/curl-8.12.1.tar.gz | tar xz
      cd curl-8.12.1
      CC=/opt/osxcross/bin/oa64-clang \
      CFLAGS="-isysroot /opt/osxcross/SDK/MacOSX12.3.sdk -mmacosx-version-min=11.0" \
      LDFLAGS="-isysroot /opt/osxcross/SDK/MacOSX12.3.sdk" \
      ./configure \
        --host=aarch64-apple-darwin \
        --build=x86_64-pc-linux-gnu \
        --with-sysroot=/opt/osxcross/SDK/MacOSX12.3.sdk \
        --prefix=/opt/osxcross/target \
        --enable-static --disable-shared \
        --without-ssl --without-libssh2 --without-nghttp2 --without-libpsl \
        --disable-ldap --disable-ldaps --disable-rtsp --disable-dict \
        --disable-telnet --disable-tftp --disable-pop3 --disable-imap \
        --disable-smtp --disable-gopher --disable-mqtt --disable-manual
      make -C lib -j$(nproc)
      make -C lib install

      # Build cdrive for macOS arm64
      cd /build
      make clean
      make darwin-arm64

      mkdir -p artifacts
      cp out/dist/cdrive-darwin-arm64 artifacts/cdrive-darwin-arm64
      buildkite-agent artifact upload "artifacts/cdrive-darwin-arm64"

  - wait: ~
    continue_on_failure: false

  - label: ":rocket: Release"
    key: "release"
    depends_on:
      - step: "version"
        allow_failure: false
    plugins:
      - docker#v5.12.0:
          image: "alpine:3.20"
          workdir: "/build"
          environment:
            - BUILDKITE_TAG
            - BUILDKITE_COMMIT
            - BUILDKITE_BRANCH
            - BUILDKITE_PULL_REQUEST
            - BUILDKITE_REPO
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      if [ "$${BUILDKITE_PULL_REQUEST}" != "false" ]; then
        echo "PR build -- skipping release"; exit 0
      fi
      if [ "$${BUILDKITE_BRANCH}" != "master" ] && [ -z "$${BUILDKITE_TAG}" ]; then
        echo "Non-master, non-tag -- skipping release"; exit 0
      fi

      apk add --no-cache git github-cli curl

      VERSION=$$(buildkite-agent meta-data get release-version)
      IS_TAG=$$(buildkite-agent meta-data get is-tag)
      IS_BETA=$$(buildkite-agent meta-data get is-beta)

      echo "--- Downloading all artifacts"
      for step in build-linux-x86_64 build-linux-i386 build-linux-arm64 build-linux-armhf \
                  build-windows-x86_64 build-windows-i386 \
                  build-darwin-x86_64 build-darwin-arm64; do
        buildkite-agent artifact download "artifacts/*" . --step "$${step}" 2>&1 || true
      done

      echo "--- Collecting release assets"
      mkdir -p release-assets
      find artifacts/ -type f -exec cp {} release-assets/ \; 2>/dev/null
      ls -lh release-assets/

      # Create checksums
      cd release-assets
      sha256sum * > checksums.txt
      cd ..

      git config user.email "ci@buildkite"
      git config user.name "Buildkite CI"
      git remote set-url origin "https://batuhantrkgl:$${GH_TOKEN}@github.com/batuhantrkgl/CDrive.git"

      if [ "$${IS_TAG}" = "true" ]; then
        echo "--- Creating GitHub Release $${VERSION}"
        gh release create "$${VERSION}" \
          --title "CDrive $${VERSION}" \
          --notes "$$(git log -20 --oneline)" \
          --prerelease="$${IS_BETA}" \
          --draft=false \
          release-assets/*
      else
        echo "--- Creating Nightly Release"
        SHORT_SHA=$$(git rev-parse --short HEAD)
        NIGHTLY_TAG="nightly-$${SHORT_SHA}"
        git tag -f "$${NIGHTLY_TAG}"
        git push origin "$${NIGHTLY_TAG}" 2>&1 || true

        gh release create "$${NIGHTLY_TAG}" \
          --title "CDrive $${NIGHTLY_TAG} ($${VERSION})" \
          --notes "Nightly build from $${BUILDKITE_BRANCH}@$${BUILDKITE_COMMIT}" \
          --prerelease=true \
          --draft=false \
          release-assets/* 2>&1 || \
        echo "Release creation skipped"
      fi
