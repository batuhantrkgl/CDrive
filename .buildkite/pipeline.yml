# .buildkite/pipeline.yml

steps:

  # ────────────────────────────────────────────
  # LINUX BUILDS (Docker on ubuntu-latest agent)
  # ────────────────────────────────────────────

  - label: ":linux: Build linux-x86_64"
    key: build-linux-x86_64
    agents:
      queue: linux
    plugins:
      - docker#v5.11.0:
          image: ubuntu:latest
          propagate-environment: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      make clean
      make

      mkdir -p dist
      cp out/dist/cdrive dist/
      tar -czf cdrive-linux-x86_64.tar.gz -C dist cdrive
      buildkite-agent artifact upload cdrive-linux-x86_64.tar.gz

  - label: ":linux: Build linux-i386"
    key: build-linux-i386
    agents:
      queue: linux
    plugins:
      - docker#v5.11.0:
          image: ubuntu:latest
          propagate-environment: true
          privileged: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      # i386
      dpkg --add-architecture i386
      apt-get update
      apt-get install -y \
        gcc-multilib \
        libc6-dev-i386 \
        linux-libc-dev:i386 \
        libjson-c-dev:i386
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:i386

      make clean
      export PKG_CONFIG_PATH="/usr/lib/i386-linux-gnu/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/i386-linux-gnu/pkgconfig"
      CFLAGS="-m32 $(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC="gcc -m32" CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p dist
      cp out/dist/cdrive dist/
      tar -czf cdrive-linux-i386.tar.gz -C dist cdrive
      buildkite-agent artifact upload cdrive-linux-i386.tar.gz

  - label: ":linux: Build linux-arm64"
    key: build-linux-arm64
    agents:
      queue: linux
    plugins:
      - docker#v5.11.0:
          image: ubuntu:latest
          propagate-environment: true
          privileged: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      CODENAME=$(grep VERSION_CODENAME /etc/os-release | cut -d= -f2)

      apt-get update
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      # arm64
      dpkg --add-architecture arm64
      apt-get install -y gcc-aarch64-linux-gnu
      sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
      echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $CODENAME main universe" >> /etc/apt/sources.list
      echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $CODENAME-updates main universe" >> /etc/apt/sources.list
      apt-get update || true
      apt-get install -y linux-libc-dev:arm64 libjson-c-dev:arm64
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:arm64

      make clean
      export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/aarch64-linux-gnu/pkgconfig"
      CFLAGS="$(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC=aarch64-linux-gnu-gcc CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p dist
      cp out/dist/cdrive dist/
      tar -czf cdrive-linux-arm64.tar.gz -C dist cdrive
      buildkite-agent artifact upload cdrive-linux-arm64.tar.gz

  - label: ":linux: Build linux-armhf"
    key: build-linux-armhf
    agents:
      queue: linux
    plugins:
      - docker#v5.11.0:
          image: ubuntu:latest
          propagate-environment: true
          privileged: true
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      CODENAME=$(grep VERSION_CODENAME /etc/os-release | cut -d= -f2)

      apt-get update
      apt-get install -y build-essential pkg-config curl git \
        libcurl4-openssl-dev libjson-c-dev

      # armhf
      dpkg --add-architecture armhf
      apt-get install -y gcc-arm-linux-gnueabihf
      sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
      echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports $CODENAME main universe" >> /etc/apt/sources.list
      echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports $CODENAME-updates main universe" >> /etc/apt/sources.list
      apt-get update || true
      apt-get install -y linux-libc-dev:armhf libjson-c-dev:armhf
      apt-get install -y -o Dpkg::Options::="--force-overwrite" libcurl4-openssl-dev:armhf

      make clean
      export PKG_CONFIG_PATH="/usr/lib/arm-linux-gnueabihf/pkgconfig"
      export PKG_CONFIG_LIBDIR="/usr/lib/arm-linux-gnueabihf/pkgconfig"
      CFLAGS="$(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CC=arm-linux-gnueabihf-gcc CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p dist
      cp out/dist/cdrive dist/
      tar -czf cdrive-linux-armhf.tar.gz -C dist cdrive
      buildkite-agent artifact upload cdrive-linux-armhf.tar.gz

  # ────────────────────────────────────────────
  # MACOS BUILDS (dedicated macOS agents)
  # ────────────────────────────────────────────

  - label: ":apple: Build darwin-x86_64"
    key: build-darwin-x86_64
    agents:
      queue: macos-x86_64
    command: |
      set -euo pipefail
      brew install curl json-c pkg-config

      make clean
      export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH"
      CFLAGS="-arch x86_64 $(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p dist
      cp out/dist/cdrive dist/
      tar -czf cdrive-darwin-x86_64.tar.gz -C dist cdrive
      buildkite-agent artifact upload cdrive-darwin-x86_64.tar.gz

  - label: ":apple: Build darwin-arm64"
    key: build-darwin-arm64
    agents:
      queue: macos-arm64
    command: |
      set -euo pipefail
      brew install curl json-c pkg-config

      make clean
      export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH"
      CFLAGS="-arch arm64 $(pkg-config --cflags libcurl json-c)"
      LIBS="$(pkg-config --libs libcurl json-c)"
      make CFLAGS="$CFLAGS" LIBS="$LIBS"

      mkdir -p dist
      cp out/dist/cdrive dist/
      tar -czf cdrive-darwin-arm64.tar.gz -C dist cdrive
      buildkite-agent artifact upload cdrive-darwin-arm64.tar.gz

  # ────────────────────────────────────────────
  # WINDOWS BUILDS (dedicated Windows agents)
  # ────────────────────────────────────────────

  - label: ":windows: Build windows-x86_64"
    key: build-windows-x86_64
    agents:
      queue: windows
    command: |
      C:\msys64\usr\bin\bash.exe -lc "
        set -euo pipefail
        export MSYSTEM=MINGW64
        source /etc/profile
        pacman -Sy --noconfirm mingw-w64-x86_64-gcc mingw-w64-x86_64-make \
          mingw-w64-x86_64-curl mingw-w64-x86_64-json-c make

        make clean
        make LIBS='-lcurl -ljson-c -lws2_32'

        mkdir -p dist
        cp out/dist/cdrive.exe dist/
        tar -czf cdrive-windows-x86_64.tar.gz -C dist cdrive.exe
      "
      buildkite-agent artifact upload cdrive-windows-x86_64.tar.gz

  - label: ":windows: Build windows-i386"
    key: build-windows-i386
    agents:
      queue: windows
    command: |
      C:\msys64\usr\bin\bash.exe -lc "
        set -euo pipefail
        export MSYSTEM=MINGW32
        source /etc/profile
        pacman -Sy --noconfirm mingw-w64-i686-gcc mingw-w64-i686-make \
          mingw-w64-i686-curl mingw-w64-i686-json-c make

        make clean
        make LIBS='-lcurl -ljson-c -lws2_32'

        mkdir -p dist
        cp out/dist/cdrive.exe dist/
        tar -czf cdrive-windows-i386.tar.gz -C dist cdrive.exe
      "
      buildkite-agent artifact upload cdrive-windows-i386.tar.gz

  # ────────────────────────────────────────────
  # WAIT FOR ALL BUILDS
  # ────────────────────────────────────────────

  - wait: ~
    continue_on_failure: false

  # ────────────────────────────────────────────
  # COMBINE ALL ARTIFACTS
  # ────────────────────────────────────────────

  - label: ":package: Combine all artifacts"
    key: combine-artifacts
    agents:
      queue: linux
    command: |
      set -euo pipefail
      mkdir -p combined

      buildkite-agent artifact download "cdrive-*.tar.gz" combined/

      ls -la combined/

      # Create combined bundle
      cd combined
      tar -czf "cdrive-all-platforms.tar.gz" cdrive-*.tar.gz
      sha256sum cdrive-*.tar.gz > checksums.txt
      ls -la

      buildkite-agent artifact upload "combined/cdrive-all-platforms.tar.gz"
      buildkite-agent artifact upload "combined/checksums.txt"

  # ────────────────────────────────────────────
  # CREATE GITHUB RELEASE
  # (runs only on main/master branch)
  # ────────────────────────────────────────────

  - label: ":rocket: Create GitHub Release"
    key: create-release
    depends_on: combine-artifacts
    branches: "main master"
    agents:
      queue: linux
    plugins:
      - docker#v5.11.0:
          image: ubuntu:latest
          environment:
            - GITHUB_TOKEN
    command: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y -q curl git jq

      # Install GitHub CLI
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
        | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
        https://cli.github.com/packages stable main" \
        | tee /etc/apt/sources.list.d/github-cli.list
      apt-get update -q
      apt-get install -y gh

      # Extract version from cdrive.h
      VERSION=$(grep 'CDRIVE_VERSION' cdrive.h | head -1 | cut -d'"' -f2)
      if [[ -z "$VERSION" ]]; then
        DATE=$(date +'%Y.%m.%d')
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_SHA=$(git rev-parse --short HEAD)
        VERSION="${DATE}.${COMMIT_COUNT}-${SHORT_SHA}"
      fi
      echo "Version: $VERSION"

      # Download all artifacts
      mkdir -p release
      buildkite-agent artifact download "cdrive-*.tar.gz" release/
      buildkite-agent artifact download "checksums.txt" release/

      # Generate checksums for the full bundle too
      cd release
      sha256sum *.tar.gz > checksums.txt

      # Create release
      TAG_NAME="v${VERSION}"
      gh release create "${TAG_NAME}" \
        --title "CDrive v${VERSION}" \
        --notes "Release v${VERSION} — built for linux-x86_64, linux-i386, linux-arm64, linux-armhf, darwin-x86_64, darwin-arm64, windows-x86_64, windows-i386" \
        --repo "${BUILDKITE_REPO}" \
        *.tar.gz \
        checksums.txt

      echo "Release created: $(gh release view $TAG_NAME --json url --jq '.url')"
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"